name: desert_brew_app
description: Desert Brew OS — Industrial MES/ERP for Craft Brewery Management
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_bloc: ^9.1.0
  equatable: ^2.0.7

  # Networking
  dio: ^5.7.0
  connectivity_plus: ^6.1.4

  # Code Generation (annotations only)
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  # Dependency Injection
  get_it: ^8.0.3
  injectable: ^2.5.0

  # Routing
  go_router: ^14.8.1

  # UI
  fl_chart: ^0.70.2
  google_fonts: ^6.2.1

  # Utilities
  intl: ^0.19.0
  share_plus: ^10.1.4
  path_provider: ^2.1.5
  uuid: ^4.5.1
  logger: ^2.5.0
  cryptography: ^2.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

  # Code Generation
  build_runner: ^2.4.14
  freezed: ^3.0.0
  json_serializable: ^6.9.4
  injectable_generator: ^2.6.3

flutter:
  uses-material-design: true
