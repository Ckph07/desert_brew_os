name: Contract Tests

on:
  push:
    branches: ["main", "develop", "codex/**"]
  pull_request:

jobs:
  inventory-contract:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: .
    defaults:
      run:
        working-directory: services/inventory_service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run inventory contract test
        run: pytest -o addopts='' tests/integration/test_finished_product_deduct.py

  finance-contract:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: .
    defaults:
      run:
        working-directory: services/finance_service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          if [ -f requirements-test.txt ]; then pip install -r requirements-test.txt; fi
      - name: Run finance contract test
        run: pytest tests/test_internal_transfer_contract.py
